# iPhone용 .ipa 빌드 (서명 Secrets 있을 때만 동작합니다).
#
# 방법: Actions → 이 워크플로 선택 → Run workflow (수동)
# Secrets·준비 과정은 docs/ios_install.md 참고.
#
# 필요 secrets (저장소 Settings → Secrets and variables → Actions):
#   IOS_CERTIFICATE_BASE64, IOS_CERTIFICATE_PASSWORD,
#   IOS_PROVISION_PROFILE_BASE64, IOS_KEYCHAIN_PASSWORD,
#   IOS_PROVISIONING_PROFILE_NAME  (예: 애플 포털·Xcode에 보이는 프로파일 이름과 동일)

name: Build iOS IPA

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios-ipa:
    runs-on: macos-latest
    timeout-minutes: 75

    steps:
      - uses: actions/checkout@v4

      - name: Check signing secrets
        env:
          C: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          P: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          M: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          K: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
          N: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          missing=""
          [ -z "$C" ] && missing="$missing IOS_CERTIFICATE_BASE64"
          [ -z "$P" ] && missing="$missing IOS_CERTIFICATE_PASSWORD"
          [ -z "$M" ] && missing="$missing IOS_PROVISION_PROFILE_BASE64"
          [ -z "$K" ] && missing="$missing IOS_KEYCHAIN_PASSWORD"
          [ -z "$N" ] && missing="$missing IOS_PROVISIONING_PROFILE_NAME"
          if [ -n "$missing" ]; then
            echo "::error::다음 Secrets를 채운 뒤 다시 실행하세요:$missing — 자세히 docs/ios_install.md"
            exit 1
          fi

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install signing certificate & provisioning profile
        env:
          CERT_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/dist.p12"
          echo "$CERT_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import "$CERT_PATH" -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -s build.keychain login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/app.mobileprovision"
          security cms -D -i "$RUNNER_TEMP/app.mobileprovision" > "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print UUID' "$RUNNER_TEMP/profile.plist")"
          if [ -z "$PROFILE_UUID" ]; then
            echo "::error::프로파일 UUID 파싱 실패 (.mobileprovision Base64·형식 재확인)"
            exit 1
          fi
          cp "$RUNNER_TEMP/app.mobileprovision" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

      - run: flutter pub get

      - name: CocoaPods install
        run: cd ios && pod install

      - name: Write ExportOptions.plist
        env:
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          IOS_BUNDLE_ID: com.example.anncGo
          IOS_EXPORT_METHOD: ad-hoc
        run: python3 ios/ci/write_export_options.py

      - name: Build IPA (same build-number idea as APK)
        run: |
          set -e
          VERSION_FULL="$(grep '^version:' pubspec.yaml | head -1 | sed 's/^version:[[:space:]]*//' | tr -d '[:space:]')"
          VERSION_NAME="${VERSION_FULL%+*}"
          if [ -z "$VERSION_NAME" ]; then VERSION_NAME="1.0.0"; fi
          flutter build ipa --release \
            --build-name="${VERSION_NAME}" \
            --build-number="${GITHUB_RUN_NUMBER}" \
            --export-options-plist=ios/ci/ExportOptions.plist

      - uses: actions/upload-artifact@v4
        with:
          name: app-release-ios-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 21
