# IT에서 로컬 Defender 예외를 줄 수 없을 때: GitHub에 푸시 후 Actions 탭에서 APK 아티팩트를 받습니다.
# (회사 정책으로 GitHub 사용이 막혀 있으면 GitLab CI 등 동일 패턴으로 옮기면 됩니다.)
name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: android-actions/setup-android@v3

      - run: flutter pub get

      # pubspec의 x.y.z는 유지하고, +뒤 빌드 번호만 매 워크플로 실행마다 자동 증가합니다.
      # (로컬 pubspec 수정 없이 테블릿에서도 GitHub 받은 빌드마다 버전 코드가 달라집니다.)
      - name: Build APK (release, CI build number)
        run: |
          set -e
          VERSION_FULL="$(grep '^version:' pubspec.yaml | head -1 | sed 's/^version:[[:space:]]*//' | tr -d '[:space:]')"
          VERSION_NAME="${VERSION_FULL%+*}"
          if [ -z "$VERSION_NAME" ]; then VERSION_NAME="1.0.0"; fi
          flutter build apk --release --build-name="${VERSION_NAME}" --build-number="${GITHUB_RUN_NUMBER}"

      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/*.apk
